<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe5e5, #ffcccc);
      padding: 20px;
    }

    .card {
      background: #ffffff;
      max-width: 420px;
      width: 100%;
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      animation: fadeIn 0.6s ease-in-out;
    }

    .icon-wrapper {
      background: #ffe5e5;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
    }

    .icon {
      font-size: 40px;
      color: #dc2626;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #333;
    }

    p {
      font-size: 15px;
      color: #666;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      font-size: 15px;
    }

    .btn:hover {
      background: #b91c1c;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }

      h1 {
        font-size: 20px;
      }

      p {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon-wrapper">
      <div class="icon">🚫</div>
    </div>

    <h1>Access Denied</h1>

    <p>
      You are not permitted to access this page.
      Please contact your administrator if you believe this is a mistake.
    </p>

    <button class="btn" onclick="history.back()">Go Back</button>
  </div>

</body>
</html>
